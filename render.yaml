services:
  - type: web
    name: fraudsentinel
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m src.model_training"
    startCommand: "gunicorn app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
